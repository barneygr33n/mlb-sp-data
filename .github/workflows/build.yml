name: Build MLB SP Data

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run SP data builder (v2 — adds K%/BB%/IP + bullpen)
        run: python3 build_sp_data.py

      - name: Install numpy
        run: pip install numpy

      - name: Run game-specific SP regression
        run: python3 run_regression.py

      - name: Run BIP-scaled weather interaction test
        run: python3 run_bip_weather.py

      - name: Commit and push if changed
        run: |
          git config user.name "sp-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add mlb_sp_games.csv team_bullpen.csv
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Build SP data v2 $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
